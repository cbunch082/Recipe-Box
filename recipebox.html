<title>The Recipe Box</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOO5vdU8Ro5gpXNZmxbsQnXqqRSoKkOB4",
    authDomain: "recipe-box-fcff7.firebaseapp.com",
    projectId: "recipe-box-fcff7",
    storageBucket: "recipe-box-fcff7.firebasestorage.app",
    messagingSenderId: "496119589276",
    appId: "1:496119589276:web:f1bb0909e98fad0fb48059"
  };

  const app = initializeApp(firebaseConfig);
  window.firebaseApp = app;

  const auth = getAuth(app);
  const db = getFirestore(app);
  setPersistence(auth, browserLocalPersistence).catch(()=>{});

  let resolveAuthReady;
  const authReadyPromise = new Promise(res => { resolveAuthReady = res; });
  let authReadyResolved = false;
  onAuthStateChanged(auth, (user) => {
    if (!authReadyResolved) { authReadyResolved = true; resolveAuthReady(user); }
  });

  window.fb = {
    auth, db,
    authReady: authReadyPromise,
    onAuthChange: (cb) => onAuthStateChanged(auth, cb),
    signIn: (email, password) => signInWithEmailAndPassword(auth, email, password),
    signOut: () => signOut(auth),
    loadDoc: async (path) => {
      const ref = doc(db, path);
      const snap = await getDoc(ref);
      return snap.exists() ? snap.data() : null;
    },
    saveDoc: async (path, data) => {
      await setDoc(doc(db, path), data);
    }
  };
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<body>

<!-- LOGIN GATE -->
<div id="login-gate" style="position:fixed;inset:0;z-index:9999;background:#F6ECDC;display:flex;align-items:center;justify-content:center;font-family:'Karla',system-ui,sans-serif;">
  <div style="background:#FFFBF3;border:1px solid #E3CFA0;border-radius:14px;padding:2.2rem;max-width:340px;width:90%;box-shadow:0 2px 8px rgba(42,37,32,0.12);text-align:center;">
    <div style="font-family:'Fraunces',Georgia,serif;font-size:1.5rem;color:#C1642E;margin-bottom:.3rem;">🍲 The Recipe Box</div>
    <div style="color:#6B5A46;font-size:.85rem;margin-bottom:1.4rem;">sign in to unlock your recipes</div>
    <input id="login-email" type="email" placeholder="email" autocomplete="username"
      style="width:100%;padding:10px 12px;margin-bottom:8px;background:#F6ECDC;border:1px solid #E3CFA0;border-radius:8px;color:#2E2013;font-family:inherit;font-size:.9rem;">
    <input id="login-password" type="password" placeholder="password" autocomplete="current-password"
      style="width:100%;padding:10px 12px;margin-bottom:12px;background:#F6ECDC;border:1px solid #E3CFA0;border-radius:8px;color:#2E2013;font-family:inherit;font-size:.9rem;">
    <button id="login-btn" onclick="doLogin()" style="width:100%;padding:10px;background:#C1642E;color:#FFF8EE;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-size:.9rem;">Enter</button>
    <div id="login-error" style="color:#9E4E22;font-size:.78rem;margin-top:10px;min-height:1em;"></div>
  </div>
</div>

<button id="logout-btn" onclick="doLogout()" style="display:none;position:fixed;bottom:16px;right:16px;z-index:100;background:#FFFBF3;border:1px solid #E3CFA0;color:#6B5A46;border-radius:20px;padding:8px 14px;font-family:'Karla',system-ui,sans-serif;font-size:.8rem;cursor:pointer;box-shadow:0 2px 8px rgba(42,37,32,0.12);">🚪 Log out</button>

<script>
  function whenFirebaseReady(cb) {
    if (window.fb) cb(); else window.addEventListener('firebase-ready', cb, {once:true});
  }
  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'enter both email and password'; return; }
    window.fb.signIn(email, password)
      .then(() => location.reload())
      .catch(e => { errEl.textContent = 'login failed — check your email and password'; console.warn(e); });
  }
  function doLogout() {
    if (window.fb) window.fb.signOut().then(() => location.reload());
  }
  whenFirebaseReady(function() {
    window.fb.onAuthChange(function(user) {
      const gate = document.getElementById('login-gate');
      const logoutBtn = document.getElementById('logout-btn');
      if (user) {
        gate.style.display = 'none';
        logoutBtn.style.display = 'block';
      } else {
        gate.style.display = 'flex';
        logoutBtn.style.display = 'none';
      }
    });
  });
</script>
